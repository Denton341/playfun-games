<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="x-ogp-key" content="fa29b0ef-94e6-4a82-b20f-08336b32c6c8">
<title>Block Surge - Block Puzzle</title>
<script src="https://sdk.play.fun"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #game-container { position: relative; }
  canvas { border: 2px solid #2a2a4a; border-radius: 4px; }
  #hud { display: flex; justify-content: space-between; width: 300px; margin-bottom: 10px; }
  #hud .label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  #hud .value { color: #00f5d4; font-size: 24px; font-weight: bold; }
  #next-piece { margin-left: 20px; }
  #next-label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
  .game-area { display: flex; align-items: flex-start; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 300px; height: 600px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(10,10,26,0.9); z-index: 10;
  }
  #overlay h2 { font-size: 2em; margin-bottom: 10px; }
  #overlay .score-val { color: #00f5d4; font-size: 2.5em; font-weight: bold; }
  .btn { padding: 12px 40px; font-size: 1em; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: linear-gradient(135deg, #7b2ff7, #00f5d4); color: #fff; margin-top: 15px; }
  .btn:hover { transform: scale(1.05); }
  .back-link { position: fixed; top: 20px; right: 20px; color: #555; text-decoration: none; font-size: 14px; }
  .back-link:hover { color: #00f5d4; }
  .controls { color: #555; font-size: 12px; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
<a href="/" class="back-link">Back to Hub</a>
<div id="game-container">
  <div id="hud">
    <div><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div><div class="label">Level</div><div class="value" id="level">1</div></div>
    <div><div class="label">Lines</div><div class="value" id="lines">0</div></div>
  </div>
  <div class="game-area">
    <canvas id="board" width="300" height="600"></canvas>
    <div id="next-piece">
      <div id="next-label">Next</div>
      <canvas id="next" width="120" height="120"></canvas>
    </div>
  </div>
  <div class="controls">Arrow keys to move/rotate. Down to drop faster.</div>
  <div id="overlay">
    <h2 id="overlay-title">Block Surge</h2>
    <p style="color:#888; margin: 5px 0;">Classic block puzzle</p>
    <div class="score-val" id="overlay-score" style="display:none;">0</div>
    <button class="btn" id="overlay-btn" onclick="startGame()">START</button>
  </div>
</div>
<script src="/shared/game-client.js"></script>
<script>
const boardCanvas = document.getElementById('board');
const boardCtx = boardCanvas.getContext('2d');
const nextCanvas = document.getElementById('next');
const nextCtx = nextCanvas.getContext('2d');

const COLS = 10, ROWS = 20, CELL = 30;

const PIECES = [
  { shape: [[1,1,1,1]], color: '#00f5d4' },             // I
  { shape: [[1,1],[1,1]], color: '#f5d400' },             // O
  { shape: [[0,1,0],[1,1,1]], color: '#7b2ff7' },        // T
  { shape: [[1,0],[1,0],[1,1]], color: '#ff6b35' },      // L
  { shape: [[0,1],[0,1],[1,1]], color: '#2196f3' },      // J
  { shape: [[0,1,1],[1,1,0]], color: '#4caf50' },        // S
  { shape: [[1,1,0],[0,1,1]], color: '#ff2770' },        // Z
];

let board, current, next, score, level, lines, gameRunning, dropTimer, dropInterval;

function createBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(null));
}

function randomPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return {
    shape: p.shape.map(r => [...r]),
    color: p.color,
    x: Math.floor(COLS / 2) - Math.floor(p.shape[0].length / 2),
    y: 0,
  };
}

function rotate(shape) {
  const rows = shape.length, cols = shape[0].length;
  const rotated = Array.from({length: cols}, () => Array(rows).fill(0));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      rotated[c][rows - 1 - r] = shape[r][c];
  return rotated;
}

function valid(shape, px, py) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++)
      if (shape[r][c]) {
        const nx = px + c, ny = py + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && board[ny][nx]) return false;
      }
  return true;
}

function lock() {
  for (let r = 0; r < current.shape.length; r++)
    for (let c = 0; c < current.shape[r].length; c++)
      if (current.shape[r][c]) {
        const ny = current.y + r;
        if (ny < 0) { gameOver(); return; }
        board[ny][current.x + c] = current.color;
      }
  clearLines();
  current = next;
  next = randomPiece();
  if (!valid(current.shape, current.x, current.y)) gameOver();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c !== null)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
      cleared++;
      r++;
    }
  }
  if (cleared > 0) {
    const points = [0, 100, 300, 500, 800][cleared] * level;
    score += points;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(100, 500 - (level - 1) * 40);
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    document.getElementById('lines').textContent = lines;
  }
}

function drawBoard() {
  boardCtx.fillStyle = '#0a0a1a';
  boardCtx.fillRect(0, 0, 300, 600);

  // Grid
  boardCtx.strokeStyle = '#1a1a2a';
  boardCtx.lineWidth = 0.5;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      boardCtx.strokeRect(c * CELL, r * CELL, CELL, CELL);
    }

  // Locked pieces
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) {
        boardCtx.fillStyle = board[r][c];
        boardCtx.fillRect(c * CELL + 1, r * CELL + 1, CELL - 2, CELL - 2);
      }

  // Ghost piece
  if (current) {
    let ghostY = current.y;
    while (valid(current.shape, current.x, ghostY + 1)) ghostY++;
    boardCtx.globalAlpha = 0.2;
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++)
        if (current.shape[r][c]) {
          boardCtx.fillStyle = current.color;
          boardCtx.fillRect((current.x + c) * CELL + 1, (ghostY + r) * CELL + 1, CELL - 2, CELL - 2);
        }
    boardCtx.globalAlpha = 1;

    // Current piece
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++)
        if (current.shape[r][c]) {
          boardCtx.shadowColor = current.color;
          boardCtx.shadowBlur = 8;
          boardCtx.fillStyle = current.color;
          boardCtx.fillRect((current.x + c) * CELL + 1, (current.y + r) * CELL + 1, CELL - 2, CELL - 2);
          boardCtx.shadowBlur = 0;
        }
  }
}

function drawNext() {
  nextCtx.fillStyle = '#0a0a1a';
  nextCtx.fillRect(0, 0, 120, 120);
  if (!next) return;
  const offsetX = (120 - next.shape[0].length * 25) / 2;
  const offsetY = (120 - next.shape.length * 25) / 2;
  for (let r = 0; r < next.shape.length; r++)
    for (let c = 0; c < next.shape[r].length; c++)
      if (next.shape[r][c]) {
        nextCtx.fillStyle = next.color;
        nextCtx.fillRect(offsetX + c * 25, offsetY + r * 25, 23, 23);
      }
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  board = createBoard();
  score = 0; level = 1; lines = 0;
  dropInterval = 500;
  document.getElementById('score').textContent = '0';
  document.getElementById('level').textContent = '1';
  document.getElementById('lines').textContent = '0';
  current = randomPiece();
  next = randomPiece();
  gameRunning = true;
  dropTimer = 0;
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

let lastTime = 0;
function loop(time) {
  if (!gameRunning) return;
  const dt = time - lastTime;
  lastTime = time;
  dropTimer += dt;
  if (dropTimer >= dropInterval) {
    dropTimer = 0;
    if (valid(current.shape, current.x, current.y + 1)) current.y++;
    else lock();
  }
  drawBoard();
  drawNext();
  requestAnimationFrame(loop);
}

async function gameOver() {
  gameRunning = false;
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('overlay-title').textContent = 'Game Over';
  document.getElementById('overlay-score').style.display = 'block';
  document.getElementById('overlay-score').textContent = score;
  document.getElementById('overlay-btn').textContent = 'PLAY AGAIN';
  await PlayFunClient.submitScore(score);
}

// Controls
window.addEventListener('keydown', e => {
  if (!gameRunning || !current) return;
  switch(e.key) {
    case 'ArrowLeft':
      if (valid(current.shape, current.x - 1, current.y)) current.x--;
      break;
    case 'ArrowRight':
      if (valid(current.shape, current.x + 1, current.y)) current.x++;
      break;
    case 'ArrowDown':
      if (valid(current.shape, current.x, current.y + 1)) { current.y++; score += 1; }
      break;
    case 'ArrowUp':
      const rotated = rotate(current.shape);
      if (valid(rotated, current.x, current.y)) current.shape = rotated;
      break;
    case ' ':
      while (valid(current.shape, current.x, current.y + 1)) { current.y++; score += 2; }
      lock();
      break;
  }
  e.preventDefault();
});

PlayFunClient.init('block-surge', 'GAME_ID_HERE');
</script>
</body>
</html>
