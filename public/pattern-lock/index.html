<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="x-ogp-key" content="fa29b0ef-94e6-4a82-b20f-08336b32c6c8">
<title>Pattern Lock - Play.fun</title>
<script src="https://sdk.play.fun"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a; color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; overflow: hidden;
  }
  .btn {
    padding: 14px 50px; font-size: 1.1em; font-weight: bold; border: none;
    border-radius: 8px; cursor: pointer; background: linear-gradient(135deg, #7b2ff7, #00f5d4);
    color: #fff; margin-top: 15px; transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0,245,212,0.4); }
  #hub-link {
    position: fixed; top: 15px; right: 20px; color: #00f5d4; text-decoration: none;
    font-size: 0.95em; z-index: 100; opacity: 0.8; transition: opacity 0.2s;
  }
  #hub-link:hover { opacity: 1; }
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,10,26,0.92); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 50;
    backdrop-filter: blur(8px);
  }
  .overlay h1 { font-size: 2.8em; margin-bottom: 10px; background: linear-gradient(135deg, #7b2ff7, #00f5d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .overlay p { font-size: 1.15em; color: #aaa; margin-bottom: 5px; }
  .hidden { display: none !important; }
  .score-display { font-size: 2.2em; color: #00f5d4; margin: 10px 0; text-shadow: 0 0 20px rgba(0,245,212,0.4); }

  #game-area { text-align: center; }
  #status-text {
    font-size: 1.4em; margin-bottom: 20px; min-height: 40px;
    text-shadow: 0 0 10px rgba(0,245,212,0.3);
  }
  #round-info { font-size: 1em; color: #aaa; margin-bottom: 15px; }

  .grid-container {
    position: relative; width: 280px; height: 280px; margin: 0 auto;
  }
  canvas#line-canvas {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 2;
  }
  .dot-grid {
    position: relative; width: 100%; height: 100%;
    display: grid; grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    z-index: 3;
  }
  .dot-cell {
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .dot {
    width: 36px; height: 36px; border-radius: 50%;
    background: #1a1a3e; border: 3px solid #333;
    transition: all 0.25s; position: relative;
  }
  .dot::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); width: 10px; height: 10px;
    border-radius: 50%; background: transparent; transition: all 0.25s;
  }
  .dot.showing {
    border-color: #7b2ff7; background: #2a1a5e;
    box-shadow: 0 0 20px rgba(123,47,247,0.5);
  }
  .dot.showing::after { background: #7b2ff7; }
  .dot.selected {
    border-color: #00f5d4; background: #0a2a2a;
    box-shadow: 0 0 20px rgba(0,245,212,0.5);
  }
  .dot.selected::after { background: #00f5d4; }
  .dot.correct {
    border-color: #00f5d4; background: #0a3a2a;
    box-shadow: 0 0 25px rgba(0,245,212,0.6);
    animation: correctPulse 0.4s;
  }
  .dot.wrong {
    border-color: #ff2770; background: #3a0a1a;
    box-shadow: 0 0 25px rgba(255,39,112,0.6);
    animation: shake 0.4s;
  }
  @keyframes correctPulse { 50% { transform: scale(1.3); } }
  @keyframes shake {
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
  }

  .progress-bar {
    width: 280px; height: 6px; background: #1a1a3e; border-radius: 3px;
    margin: 20px auto 0; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, #7b2ff7, #00f5d4);
    border-radius: 3px; transition: width 0.3s;
  }
</style>
</head>
<body>
<a id="hub-link" href="/">← Back to Hub</a>

<div id="start-screen" class="overlay">
  <h1>Pattern Lock</h1>
  <p>Watch the pattern, then recreate it!</p>
  <p style="color:#7b2ff7">Patterns get longer each round</p>
  <button class="btn" onclick="startGame()">Play</button>
</div>

<div id="game-over-screen" class="overlay hidden">
  <h1>Game Over</h1>
  <div class="score-display" id="final-score">0</div>
  <p id="result-detail"></p>
  <button class="btn" onclick="startGame()">Play Again</button>
</div>

<div id="game-area" class="hidden">
  <div id="round-info">Round 1 — Pattern: 3 dots</div>
  <div id="status-text">Watch carefully...</div>
  <div class="grid-container">
    <canvas id="line-canvas" width="280" height="280"></canvas>
    <div class="dot-grid" id="dot-grid"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<script src="/shared/game-client.js"></script>
<script>
let pattern, playerPattern, round, score, phase, patternLen, lives;
const dotPositions = [];

function init() {
  PlayFunClient.init('pattern-lock', '79127adf-0665-4069-8dfa-3aca1760f182');
  buildGrid();
}

function buildGrid() {
  const grid = document.getElementById('dot-grid');
  grid.innerHTML = '';
  dotPositions.length = 0;
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'dot-cell';
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.dataset.index = i;
    dot.addEventListener('click', () => onDotClick(i));
    cell.appendChild(dot);
    grid.appendChild(cell);
  }
  // Calculate dot center positions after layout
  requestAnimationFrame(() => {
    const container = document.querySelector('.grid-container');
    const rect = container.getBoundingClientRect();
    document.querySelectorAll('.dot').forEach((d, i) => {
      const dr = d.getBoundingClientRect();
      dotPositions[i] = {
        x: dr.left + dr.width / 2 - rect.left,
        y: dr.top + dr.height / 2 - rect.top
      };
    });
  });
}

function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over-screen').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');
  round = 0; score = 0; lives = 3;
  nextRound();
}

function nextRound() {
  round++;
  patternLen = 2 + round; // starts at 3
  pattern = generatePattern(patternLen);
  playerPattern = [];
  clearDots();
  clearLines();
  document.getElementById('round-info').textContent = `Round ${round} — Pattern: ${patternLen} dots | Lives: ${'❤️'.repeat(lives)}`;
  document.getElementById('status-text').textContent = 'Watch carefully...';
  document.getElementById('progress-fill').style.width = '0%';
  phase = 'showing';
  showPattern();
}

function generatePattern(len) {
  const p = [];
  const available = [0,1,2,3,4,5,6,7,8];
  for (let i = 0; i < Math.min(len, 9); i++) {
    const idx = Math.floor(Math.random() * available.length);
    p.push(available.splice(idx, 1)[0]);
  }
  return p;
}

function showPattern() {
  let i = 0;
  const interval = setInterval(() => {
    if (i > 0) {
      getDot(pattern[i - 1]).classList.remove('showing');
    }
    if (i < pattern.length) {
      getDot(pattern[i]).classList.add('showing');
      if (i > 0) drawLine(pattern[i - 1], pattern[i], '#7b2ff7');
      i++;
    } else {
      clearInterval(interval);
      setTimeout(() => {
        clearDots();
        clearLines();
        phase = 'input';
        document.getElementById('status-text').textContent = 'Your turn! Recreate the pattern';
      }, 400);
    }
  }, 600);
}

function getDot(index) {
  return document.querySelector(`.dot[data-index="${index}"]`);
}

function clearDots() {
  document.querySelectorAll('.dot').forEach(d => {
    d.classList.remove('showing', 'selected', 'correct', 'wrong');
  });
}

function clearLines() {
  const canvas = document.getElementById('line-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawLine(fromIdx, toIdx, color) {
  const canvas = document.getElementById('line-canvas');
  const ctx = canvas.getContext('2d');
  const from = dotPositions[fromIdx];
  const to = dotPositions[toIdx];
  if (!from || !to) return;
  ctx.beginPath();
  ctx.moveTo(from.x, from.y);
  ctx.lineTo(to.x, to.y);
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function onDotClick(index) {
  if (phase !== 'input') return;
  if (playerPattern.includes(index)) return;

  playerPattern.push(index);
  const step = playerPattern.length - 1;

  if (playerPattern.length > 1) {
    drawLine(playerPattern[step - 1], index, '#00f5d4');
  }

  const progress = (playerPattern.length / pattern.length) * 100;
  document.getElementById('progress-fill').style.width = progress + '%';

  if (pattern[step] === index) {
    getDot(index).classList.add('selected');
    if (playerPattern.length === pattern.length) {
      phase = 'done';
      // All correct
      const roundScore = round * patternLen;
      score += roundScore;
      document.getElementById('status-text').innerHTML = `<span style="color:#00f5d4">Correct! +${roundScore} points</span>`;
      document.querySelectorAll('.dot.selected').forEach(d => {
        d.classList.remove('selected');
        d.classList.add('correct');
      });
      setTimeout(nextRound, 1200);
    }
  } else {
    phase = 'done';
    getDot(index).classList.add('wrong');
    lives--;
    if (lives <= 0) {
      document.getElementById('status-text').innerHTML = '<span style="color:#ff2770">Wrong! Game Over</span>';
      setTimeout(endGame, 1000);
    } else {
      document.getElementById('status-text').innerHTML = `<span style="color:#ff2770">Wrong! ${lives} lives left</span>`;
      setTimeout(nextRound, 1200);
    }
  }
}

async function endGame() {
  document.getElementById('final-score').textContent = score;
  document.getElementById('result-detail').textContent = `You completed ${round - 1} rounds!`;
  document.getElementById('game-over-screen').classList.remove('hidden');
  try { await PlayFunClient.submitScore(score); } catch(e) { console.log('Score submit error', e); }
}

init();
</script>
</body>
</html>
