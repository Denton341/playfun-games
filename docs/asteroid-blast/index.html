<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="x-ogp-key" content="fa29b0ef-94e6-4a82-b20f-08336b32c6c8">
<title>Asteroid Blast - Space Shooter</title>
<script src="https://sdk.play.fun"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  #score-hud { position: absolute; top: 20px; left: 20px; }
  #score-hud .score { font-size: 2em; color: #00f5d4; font-weight: bold; }
  #score-hud .lives { color: #ff2770; font-size: 1.5em; }
  .overlay { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.9); pointer-events:all; }
  .overlay-box { text-align: center; padding: 40px; }
  .overlay-box h1 { color: #00f5d4; font-size: 2.5em; }
  .overlay-box h2 { color: #fff; font-size: 2em; }
  .overlay-box p { color: #888; margin: 8px 0; }
  .big-score { color: #00f5d4; font-size: 3em; font-weight: bold; }
  .btn { padding: 14px 50px; font-size: 1.1em; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: linear-gradient(135deg, #7b2ff7, #00f5d4); color: #fff; margin-top: 15px; pointer-events: all; }
  .back-link { position: absolute; top: 20px; right: 20px; color: #555; text-decoration: none; font-size: 14px; pointer-events: all; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="score-hud">
    <div class="score" id="score">0</div>
    <div class="lives" id="lives"></div>
  </div>
  <a href="/" class="back-link">Back to Hub</a>
  <div class="overlay" id="start-screen">
    <div class="overlay-box">
      <h1>Asteroid Blast</h1>
      <p>Arrow keys to move. Space to shoot. Destroy asteroids!</p>
      <button class="btn" onclick="startGame()">LAUNCH</button>
    </div>
  </div>
  <div class="overlay" id="end-screen" style="display:none;">
    <div class="overlay-box">
      <h2>Destroyed!</h2>
      <div class="big-score" id="final-score">0</div>
      <button class="btn" onclick="startGame()">RETRY</button>
    </div>
  </div>
</div>
<script src="/shared/game-client.js"></script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let player, bullets, asteroids, particles, stars, score, lives, gameRunning;

function init() {
  player = { x: W/2, y: H - 80, w: 24, h: 30, speed: 6 };
  bullets = []; asteroids = []; particles = [];
  stars = Array.from({length: 100}, () => ({ x: Math.random()*W, y: Math.random()*H, s: Math.random()*2+0.5, sp: Math.random()*1+0.3 }));
  score = 0; lives = 3;
  document.getElementById('score').textContent = '0';
  updateLives();
}

function updateLives() { document.getElementById('lives').textContent = '♥'.repeat(lives); }

let keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; if(e.code==='Space') e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch
let touchX = null;
canvas.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchX !== null) {
    player.x += (e.touches[0].clientX - touchX) * 1.5;
    touchX = e.touches[0].clientX;
  }
});
canvas.addEventListener('touchend', () => { touchX = null; });

function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('end-screen').style.display = 'none';
  init();
  gameRunning = true;
  requestAnimationFrame(loop);
}

let shootCooldown = 0, spawnTimer = 0;
function update() {
  // Input
  if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
  player.x = Math.max(player.w, Math.min(W - player.w, player.x));

  // Auto-shoot (and space)
  shootCooldown--;
  if (shootCooldown <= 0 && (keys[' '] || touchX !== null || true)) {
    bullets.push({ x: player.x, y: player.y - player.h/2, vy: -8 });
    shootCooldown = 12;
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].y += bullets[i].vy;
    if (bullets[i].y < -10) bullets.splice(i, 1);
  }

  // Spawn asteroids
  spawnTimer++;
  const spawnRate = Math.max(20, 60 - score * 0.3);
  if (spawnTimer >= spawnRate) {
    spawnTimer = 0;
    const size = 15 + Math.random() * 30;
    asteroids.push({
      x: Math.random() * W, y: -size,
      size, vy: 1.5 + Math.random() * 2 + score * 0.01,
      vx: (Math.random() - 0.5) * 2, hp: Math.ceil(size / 15)
    });
  }

  // Asteroids
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.x += a.vx; a.y += a.vy;
    if (a.y > H + 50) { asteroids.splice(i, 1); continue; }

    // Bullet collision
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      if (Math.sqrt(dx*dx + dy*dy) < a.size) {
        bullets.splice(j, 1);
        a.hp--;
        spawnParticles(b.x, b.y, '#f5d400', 4);
        if (a.hp <= 0) {
          score += Math.ceil(a.size);
          document.getElementById('score').textContent = score;
          spawnParticles(a.x, a.y, '#ff2770', 10);
          asteroids.splice(i, 1);
        }
        break;
      }
    }

    // Player collision
    if (asteroids[i]) {
      const dx = player.x - a.x, dy = player.y - a.y;
      if (Math.sqrt(dx*dx + dy*dy) < a.size + 15) {
        spawnParticles(player.x, player.y, '#ff2770', 15);
        asteroids.splice(i, 1);
        lives--;
        updateLives();
        if (lives <= 0) { gameOver(); return; }
      }
    }
  }

  // Stars
  stars.forEach(s => { s.y += s.sp; if (s.y > H) { s.y = 0; s.x = Math.random() * W; } });

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++)
    particles.push({ x, y, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 1, color, size: Math.random()*3+1 });
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => { ctx.fillStyle = `rgba(255,255,255,${s.s*0.3})`; ctx.fillRect(s.x, s.y, s.s, s.s); });

  // Player ship (triangle)
  ctx.shadowColor = '#00f5d4'; ctx.shadowBlur = 12;
  ctx.fillStyle = '#00f5d4';
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - player.h/2);
  ctx.lineTo(player.x - player.w/2, player.y + player.h/2);
  ctx.lineTo(player.x + player.w/2, player.y + player.h/2);
  ctx.closePath(); ctx.fill();
  // Engine glow
  ctx.fillStyle = '#7b2ff7';
  ctx.beginPath();
  ctx.moveTo(player.x - 6, player.y + player.h/2);
  ctx.lineTo(player.x, player.y + player.h/2 + 10 + Math.random()*5);
  ctx.lineTo(player.x + 6, player.y + player.h/2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Bullets
  bullets.forEach(b => {
    ctx.shadowColor = '#f5d400'; ctx.shadowBlur = 6;
    ctx.fillStyle = '#f5d400';
    ctx.fillRect(b.x - 2, b.y, 4, 10);
    ctx.shadowBlur = 0;
  });

  // Asteroids
  asteroids.forEach(a => {
    ctx.shadowColor = '#ff2770'; ctx.shadowBlur = 8;
    ctx.fillStyle = '#554444';
    ctx.strokeStyle = '#ff2770';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(a.x, a.y, a.size, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;
  });

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
    ctx.globalAlpha = 1;
  });
}

function loop() { if (!gameRunning) return; update(); draw(); requestAnimationFrame(loop); }

async function gameOver() {
  gameRunning = false;
  document.getElementById('final-score').textContent = score;
  document.getElementById('end-screen').style.display = 'flex';
  await PlayFunClient.submitScore(score);
}

PlayFunClient.init('asteroid-blast', 'ac6f077b-0545-4f92-9490-34f72c3368eb');
</script>
</body>
</html>
