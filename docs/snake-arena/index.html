<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="x-ogp-key" content="fa29b0ef-94e6-4a82-b20f-08336b32c6c8">
<title>Snake Arena - Survival</title>
<script src="https://sdk.play.fun"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  canvas { border: 2px solid #2a2a4a; border-radius: 4px; }
  #hud { display: flex; justify-content: space-between; width: 400px; margin-bottom: 10px; }
  .hud-item .label { color: #888; font-size: 12px; text-transform: uppercase; }
  .hud-item .value { color: #00f5d4; font-size: 1.8em; font-weight: bold; }
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,10,26,0.95); display: flex; align-items: center; justify-content: center; z-index: 10;
  }
  .overlay-box { text-align: center; padding: 40px; }
  .overlay-box h1 { color: #00f5d4; font-size: 2.5em; }
  .overlay-box h2 { font-size: 2em; }
  .overlay-box p { color: #888; margin: 8px 0; }
  .big-score { color: #00f5d4; font-size: 3em; font-weight: bold; }
  .btn { padding: 14px 50px; font-size: 1.1em; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: linear-gradient(135deg, #7b2ff7, #00f5d4); color: #fff; margin-top: 15px; }
  .back-link { position: fixed; top: 20px; right: 20px; color: #555; text-decoration: none; font-size: 14px; z-index: 20; }
  .back-link:hover { color: #00f5d4; }
  .controls-hint { color: #555; font-size: 12px; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
<a href="/" class="back-link">Back to Hub</a>
<div>
  <div id="hud">
    <div class="hud-item"><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div class="hud-item"><div class="label">Length</div><div class="value" id="length">3</div></div>
    <div class="hud-item"><div class="label">Best</div><div class="value" id="best">0</div></div>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="controls-hint">Arrow keys or WASD to move. Swipe on mobile.</div>
</div>
<div class="overlay" id="start-overlay">
  <div class="overlay-box">
    <h1>Snake Arena</h1>
    <p>Eat food. Grow longer. Don't hit yourself!</p>
    <button class="btn" onclick="startGame()">PLAY</button>
  </div>
</div>
<div class="overlay" id="end-overlay" style="display:none;">
  <div class="overlay-box">
    <h2>Game Over</h2>
    <div class="big-score" id="final-score">0</div>
    <p>Best: <span id="final-best">0</span></p>
    <button class="btn" onclick="startGame()">PLAY AGAIN</button>
  </div>
</div>
<script src="/shared/game-client.js"></script>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, specialFood, score, gameRunning, gameInterval;
let bestScore = parseInt(localStorage.getItem('snake-arena-best') || '0');
document.getElementById('best').textContent = bestScore;

function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  document.getElementById('end-overlay').style.display = 'none';

  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  specialFood = null;
  spawnFood();
  updateHUD();
  gameRunning = true;
  clearInterval(gameInterval);
  gameInterval = setInterval(tick, 100);
}

function spawnFood() {
  do {
    food = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function spawnSpecialFood() {
  if (specialFood) return;
  do {
    specialFood = {
      x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS),
      life: 50 // Ticks before it disappears
    };
  } while (snake.some(s => s.x === specialFood.x && s.y === specialFood.y) ||
           (food.x === specialFood.x && food.y === specialFood.y));
}

function tick() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wrap around
  if (head.x < 0) head.x = COLS - 1;
  if (head.x >= COLS) head.x = 0;
  if (head.y < 0) head.y = ROWS - 1;
  if (head.y >= ROWS) head.y = 0;

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  // Food
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    spawnFood();
    if (score % 50 === 0) spawnSpecialFood();
  } else if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
    score += 50;
    specialFood = null;
  } else {
    snake.pop();
  }

  // Special food timer
  if (specialFood) {
    specialFood.life--;
    if (specialFood.life <= 0) specialFood = null;
  }

  updateHUD();
  draw();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('length').textContent = snake.length;
}

function draw() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = '#111122';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++)
      ctx.strokeRect(x * GRID, y * GRID, GRID, GRID);

  // Snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    if (i === 0) {
      ctx.shadowColor = '#00f5d4';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#00f5d4';
    } else {
      ctx.shadowBlur = 0;
      ctx.fillStyle = `hsl(${160 + t * 60}, 80%, ${50 - t * 20}%)`;
    }
    ctx.fillRect(seg.x * GRID + 1, seg.y * GRID + 1, GRID - 2, GRID - 2);
  });
  ctx.shadowBlur = 0;

  // Food
  ctx.shadowColor = '#ff2770';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ff2770';
  ctx.beginPath();
  ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Special food
  if (specialFood) {
    const pulse = 0.7 + Math.sin(Date.now() * 0.01) * 0.3;
    ctx.shadowColor = '#f5d400';
    ctx.shadowBlur = 12;
    ctx.fillStyle = `rgba(245,212,0,${pulse})`;
    ctx.beginPath();
    ctx.arc(specialFood.x * GRID + GRID / 2, specialFood.y * GRID + GRID / 2, GRID / 2 - 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

async function gameOver() {
  gameRunning = false;
  clearInterval(gameInterval);
  if (score > bestScore) { bestScore = score; localStorage.setItem('snake-arena-best', bestScore); }
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-best').textContent = bestScore;
  document.getElementById('best').textContent = bestScore;
  document.getElementById('end-overlay').style.display = 'flex';
  await PlayFunClient.submitScore(score);
}

// Controls
window.addEventListener('keydown', e => {
  if (!gameRunning) return;
  switch (e.key) {
    case 'ArrowUp': case 'w': if (dir.y !== 1) nextDir = { x: 0, y: -1 }; break;
    case 'ArrowDown': case 's': if (dir.y !== -1) nextDir = { x: 0, y: 1 }; break;
    case 'ArrowLeft': case 'a': if (dir.x !== 1) nextDir = { x: -1, y: 0 }; break;
    case 'ArrowRight': case 'd': if (dir.x !== -1) nextDir = { x: 1, y: 0 }; break;
  }
  e.preventDefault();
});

// Touch controls
let touchX = 0, touchY = 0;
canvas.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const dx = e.touches[0].clientX - touchX;
  const dy = e.touches[0].clientY - touchY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20 && dir.x !== -1) { nextDir = { x: 1, y: 0 }; touchX = e.touches[0].clientX; }
    if (dx < -20 && dir.x !== 1) { nextDir = { x: -1, y: 0 }; touchX = e.touches[0].clientX; }
  } else {
    if (dy > 20 && dir.y !== -1) { nextDir = { x: 0, y: 1 }; touchY = e.touches[0].clientY; }
    if (dy < -20 && dir.y !== 1) { nextDir = { x: 0, y: -1 }; touchY = e.touches[0].clientY; }
  }
});

PlayFunClient.init('snake-arena', 'cbf9ffa0-2773-4123-970f-a39e9836e499');
</script>
</body>
</html>
