<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="x-ogp-key" content="fa29b0ef-94e6-4a82-b20f-08336b32c6c8">
<title>Memory Matrix - Brain Game</title>
<script src="https://sdk.play.fun"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { text-align: center; }
  h1 { color: #00f5d4; margin-bottom: 5px; }
  #hud { display: flex; justify-content: center; gap: 40px; margin: 15px 0; }
  .hud-item .label { color: #888; font-size: 12px; text-transform: uppercase; }
  .hud-item .value { color: #00f5d4; font-size: 1.8em; font-weight: bold; }
  #grid { display: inline-grid; gap: 8px; }
  .cell {
    width: 70px; height: 70px; background: #14141f; border: 2px solid #2a2a4a;
    border-radius: 10px; cursor: pointer; transition: all 0.3s;
  }
  .cell.revealed { background: #7b2ff7; border-color: #7b2ff7; }
  .cell.correct { background: #00f5d4; border-color: #00f5d4; }
  .cell.wrong { background: #ff2770; border-color: #ff2770; }
  .cell:hover { border-color: #555; }
  #message { color: #888; font-size: 1.2em; margin: 15px 0; min-height: 30px; }
  .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,10,26,0.95); display:flex; align-items:center; justify-content:center; z-index:10; }
  .overlay-box { text-align: center; padding: 40px; }
  .overlay-box h1 { color: #00f5d4; font-size: 2.5em; }
  .overlay-box h2 { font-size: 2em; }
  .overlay-box p { color: #888; margin: 8px 0; }
  .big-score { color: #00f5d4; font-size: 3em; font-weight: bold; }
  .btn { padding: 14px 50px; font-size: 1.1em; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: linear-gradient(135deg, #7b2ff7, #00f5d4); color: #fff; margin-top: 15px; }
  .back-link { position: fixed; top: 20px; right: 20px; color: #555; text-decoration: none; font-size: 14px; z-index: 20; }
</style>
</head>
<body>
<a href="/" class="back-link">Back to Hub</a>
<div class="container" id="game-screen" style="display:none;">
  <div id="hud">
    <div class="hud-item"><div class="label">Level</div><div class="value" id="level">1</div></div>
    <div class="hud-item"><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div class="hud-item"><div class="label">Lives</div><div class="value" id="lives">3</div></div>
  </div>
  <div id="message">Watch the pattern...</div>
  <div id="grid"></div>
</div>
<div class="overlay" id="start-overlay">
  <div class="overlay-box">
    <h1>Memory Matrix</h1>
    <p>Remember the highlighted tiles. Repeat the pattern!</p>
    <button class="btn" onclick="startGame()">PLAY</button>
  </div>
</div>
<div class="overlay" id="end-overlay" style="display:none;">
  <div class="overlay-box">
    <h2>Game Over</h2>
    <div class="big-score" id="final-score">0</div>
    <p>Reached level <span id="final-level">1</span></p>
    <button class="btn" onclick="startGame()">PLAY AGAIN</button>
  </div>
</div>
<script src="/shared/game-client.js"></script>
<script>
let gridSize = 3, pattern = [], playerPattern = [], score = 0, level = 1, lives = 3;
let accepting = false;

function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  document.getElementById('end-overlay').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  gridSize = 3; score = 0; level = 1; lives = 3;
  updateHUD();
  nextRound();
}

function updateHUD() {
  document.getElementById('level').textContent = level;
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = `repeat(${gridSize}, 70px)`;
  grid.innerHTML = '';
  for (let i = 0; i < gridSize * gridSize; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;
    cell.onclick = () => handleCellClick(i);
    grid.appendChild(cell);
  }
}

function nextRound() {
  accepting = false;
  playerPattern = [];
  buildGrid();

  // Generate pattern: level + 2 tiles
  const tileCount = Math.min(level + 2, gridSize * gridSize - 1);
  pattern = [];
  const available = Array.from({length: gridSize * gridSize}, (_, i) => i);
  for (let i = 0; i < tileCount; i++) {
    const idx = Math.floor(Math.random() * available.length);
    pattern.push(available[idx]);
    available.splice(idx, 1);
  }

  document.getElementById('message').textContent = 'Watch the pattern...';

  // Show pattern
  setTimeout(() => {
    const cells = document.querySelectorAll('.cell');
    pattern.forEach(i => cells[i].classList.add('revealed'));

    // Hide after delay
    const showTime = Math.max(800, 2000 - level * 100);
    setTimeout(() => {
      cells.forEach(c => c.classList.remove('revealed'));
      document.getElementById('message').textContent = `Find ${pattern.length} tiles!`;
      accepting = true;
    }, showTime);
  }, 500);
}

function handleCellClick(index) {
  if (!accepting) return;
  const cells = document.querySelectorAll('.cell');
  const cell = cells[index];

  if (playerPattern.includes(index)) return; // Already clicked
  playerPattern.push(index);

  if (pattern.includes(index)) {
    cell.classList.add('correct');
    if (playerPattern.filter(i => pattern.includes(i)).length === pattern.length) {
      // Round complete!
      accepting = false;
      score += pattern.length * 10 * level;
      level++;
      if (level % 3 === 0 && gridSize < 6) gridSize++;
      updateHUD();
      document.getElementById('message').textContent = 'Correct!';
      setTimeout(nextRound, 1000);
    }
  } else {
    cell.classList.add('wrong');
    lives--;
    updateHUD();
    if (lives <= 0) {
      accepting = false;
      gameOver();
    } else {
      document.getElementById('message').textContent = `Wrong! ${lives} lives left`;
    }
  }
}

async function gameOver() {
  document.getElementById('message').textContent = '';
  // Show correct answer
  const cells = document.querySelectorAll('.cell');
  pattern.forEach(i => cells[i].classList.add('revealed'));

  setTimeout(async () => {
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-level').textContent = level;
    document.getElementById('end-overlay').style.display = 'flex';
    await PlayFunClient.submitScore(score);
  }, 1000);
}

PlayFunClient.init('memory-matrix', 'd91376f9-7354-4019-810c-a2c8c237190a');
</script>
</body>
</html>
