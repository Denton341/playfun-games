<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="x-ogp-key" content="fa29b0ef-94e6-4a82-b20f-08336b32c6c8">
<title>Tic Tac Pro - Play.fun</title>
<script src="https://sdk.play.fun"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a; color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; overflow: hidden;
  }
  .btn {
    padding: 14px 50px; font-size: 1.1em; font-weight: bold; border: none;
    border-radius: 8px; cursor: pointer; background: linear-gradient(135deg, #7b2ff7, #00f5d4);
    color: #fff; margin-top: 15px; transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0,245,212,0.4); }
  .btn-sm {
    padding: 10px 30px; font-size: 0.95em; font-weight: bold; border: 2px solid #333;
    border-radius: 8px; cursor: pointer; background: #1a1a3e; color: #fff;
    transition: all 0.2s; margin: 5px;
  }
  .btn-sm:hover { border-color: #7b2ff7; box-shadow: 0 0 15px rgba(123,47,247,0.3); }
  .btn-sm.active { border-color: #00f5d4; background: #0a2a2a; color: #00f5d4; }
  #hub-link {
    position: fixed; top: 15px; right: 20px; color: #00f5d4; text-decoration: none;
    font-size: 0.95em; z-index: 100; opacity: 0.8; transition: opacity 0.2s;
  }
  #hub-link:hover { opacity: 1; }
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,10,26,0.92); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 50;
    backdrop-filter: blur(8px);
  }
  .overlay h1 { font-size: 2.8em; margin-bottom: 10px; background: linear-gradient(135deg, #7b2ff7, #00f5d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .overlay p { font-size: 1.15em; color: #aaa; margin-bottom: 5px; }
  .hidden { display: none !important; }
  .score-display { font-size: 2.2em; color: #00f5d4; margin: 10px 0; text-shadow: 0 0 20px rgba(0,245,212,0.4); }

  .diff-select { margin: 15px 0; }
  .diff-label { color: #aaa; margin-bottom: 8px; font-size: 1em; }

  #game-area { text-align: center; }
  .scoreboard {
    display: flex; gap: 30px; justify-content: center; margin-bottom: 20px;
  }
  .sb-item { text-align: center; }
  .sb-label { font-size: 0.85em; color: #aaa; }
  .sb-val { font-size: 1.8em; font-weight: bold; }
  .sb-val.player { color: #00f5d4; }
  .sb-val.ai { color: #ff2770; }
  .sb-val.draw { color: #7b2ff7; }

  .board {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    width: 300px; height: 300px; margin: 0 auto;
    background: #1a1a3e; border-radius: 12px; padding: 8px;
    box-shadow: 0 0 30px rgba(123,47,247,0.15);
  }
  .cell {
    background: #0a0a1a; border-radius: 8px; display: flex;
    align-items: center; justify-content: center;
    font-size: 3em; font-weight: bold; cursor: pointer;
    transition: all 0.2s; border: 2px solid transparent;
  }
  .cell:hover { background: #12122a; border-color: #333; }
  .cell.x { color: #00f5d4; text-shadow: 0 0 15px rgba(0,245,212,0.5); }
  .cell.o { color: #ff2770; text-shadow: 0 0 15px rgba(255,39,112,0.5); }
  .cell.win-cell { animation: winGlow 0.5s ease-in-out infinite alternate; }
  @keyframes winGlow {
    from { box-shadow: inset 0 0 10px rgba(0,245,212,0.2); }
    to { box-shadow: inset 0 0 25px rgba(0,245,212,0.5); }
  }

  #status {
    margin-top: 18px; font-size: 1.3em; min-height: 40px;
  }
  #round-info { color: #aaa; margin-top: 8px; font-size: 0.95em; }

  .end-btns { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
</style>
</head>
<body>
<a id="hub-link" href="/">← Back to Hub</a>

<div id="start-screen" class="overlay">
  <h1>Tic Tac Pro</h1>
  <p>Beat the AI in 5 rounds!</p>
  <div class="diff-select">
    <div class="diff-label">Select Difficulty:</div>
    <button class="btn-sm active" onclick="setDiff('easy',this)">Easy</button>
    <button class="btn-sm" onclick="setDiff('medium',this)">Medium</button>
    <button class="btn-sm" onclick="setDiff('hard',this)">Hard</button>
  </div>
  <p style="color:#aaa;font-size:0.9em;">Higher difficulty = more points per win</p>
  <button class="btn" onclick="startGame()">Play</button>
</div>

<div id="game-over-screen" class="overlay hidden">
  <h1 id="final-title">Game Over</h1>
  <div class="score-display" id="final-score">0</div>
  <p id="result-detail"></p>
  <button class="btn" onclick="showStart()">Play Again</button>
</div>

<div id="game-area" class="hidden">
  <div class="scoreboard">
    <div class="sb-item"><div class="sb-label">You (X)</div><div class="sb-val player" id="p-wins">0</div></div>
    <div class="sb-item"><div class="sb-label">Draws</div><div class="sb-val draw" id="p-draws">0</div></div>
    <div class="sb-item"><div class="sb-label">AI (O)</div><div class="sb-val ai" id="a-wins">0</div></div>
  </div>
  <div class="board" id="board"></div>
  <div id="status">Your turn</div>
  <div id="round-info">Round 1 of 5</div>
</div>

<script src="/shared/game-client.js"></script>
<script>
let board, currentPlayer, gameActive, difficulty, roundNum, maxRounds;
let playerWins, aiWins, draws, totalScore, aiThinking;
const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const DIFF_MULT = { easy: 1, medium: 2, hard: 3 };

function init() {
  PlayFunClient.init('tic-tac-pro', 'd257fb1a-a8be-4ad5-bd56-e3e8baa8068e');
  buildBoard();
}

function buildBoard() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;
    cell.addEventListener('click', () => onCellClick(i));
    el.appendChild(cell);
  }
}

function setDiff(d, btn) {
  difficulty = d;
  document.querySelectorAll('.diff-select .btn-sm').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function showStart() {
  document.getElementById('game-over-screen').classList.add('hidden');
  document.getElementById('game-area').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
}

function startGame() {
  if (!difficulty) difficulty = 'easy';
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over-screen').classList.add('hidden');
  document.getElementById('game-area').classList.remove('hidden');
  roundNum = 0; maxRounds = 5; playerWins = 0; aiWins = 0; draws = 0; totalScore = 0;
  updateScoreboard();
  nextRound();
}

function nextRound() {
  roundNum++;
  board = Array(9).fill('');
  currentPlayer = 'X';
  gameActive = true;
  aiThinking = false;
  document.getElementById('round-info').textContent = `Round ${roundNum} of ${maxRounds} — ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}`;
  document.getElementById('status').textContent = 'Your turn';
  updateBoard();
}

function getCell(i) { return document.querySelector(`.cell[data-index="${i}"]`); }

function updateBoard() {
  for (let i = 0; i < 9; i++) {
    const cell = getCell(i);
    cell.textContent = board[i];
    cell.className = 'cell' + (board[i] === 'X' ? ' x' : board[i] === 'O' ? ' o' : '');
  }
}

function updateScoreboard() {
  document.getElementById('p-wins').textContent = playerWins;
  document.getElementById('a-wins').textContent = aiWins;
  document.getElementById('p-draws').textContent = draws;
}

function onCellClick(i) {
  if (!gameActive || board[i] || currentPlayer !== 'X' || aiThinking) return;
  board[i] = 'X';
  updateBoard();
  const win = checkWinner('X');
  if (win) return handleWin('X', win);
  if (board.every(c => c)) return handleDraw();
  currentPlayer = 'O';
  aiThinking = true;
  document.getElementById('status').textContent = 'AI thinking...';
  setTimeout(aiMove, 350);
}

function aiMove() {
  let move;
  if (difficulty === 'easy') {
    move = Math.random() < 0.6 ? randomMove() : bestMoveAI();
  } else if (difficulty === 'medium') {
    move = Math.random() < 0.3 ? randomMove() : bestMoveAI();
  } else {
    move = bestMoveAI();
  }
  board[move] = 'O';
  updateBoard();
  aiThinking = false;
  const win = checkWinner('O');
  if (win) return handleWin('O', win);
  if (board.every(c => c)) return handleDraw();
  currentPlayer = 'X';
  document.getElementById('status').textContent = 'Your turn';
}

function randomMove() {
  const empty = board.map((v, i) => v === '' ? i : -1).filter(i => i >= 0);
  return empty[Math.floor(Math.random() * empty.length)];
}

function bestMoveAI() {
  let best = -Infinity, bestM = -1;
  for (let i = 0; i < 9; i++) {
    if (board[i]) continue;
    board[i] = 'O';
    const s = minimax(board, false, -Infinity, Infinity);
    board[i] = '';
    if (s > best) { best = s; bestM = i; }
  }
  return bestM;
}

function minimax(b, isMax, alpha, beta) {
  if (checkWinner('O')) return 10;
  if (checkWinner('X')) return -10;
  if (b.every(c => c)) return 0;
  if (isMax) {
    let val = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (b[i]) continue;
      b[i] = 'O';
      val = Math.max(val, minimax(b, false, alpha, beta));
      b[i] = '';
      alpha = Math.max(alpha, val);
      if (beta <= alpha) break;
    }
    return val;
  } else {
    let val = Infinity;
    for (let i = 0; i < 9; i++) {
      if (b[i]) continue;
      b[i] = 'X';
      val = Math.min(val, minimax(b, true, alpha, beta));
      b[i] = '';
      beta = Math.min(beta, val);
      if (beta <= alpha) break;
    }
    return val;
  }
}

function checkWinner(player) {
  for (const line of LINES) {
    if (line.every(i => board[i] === player)) return line;
  }
  return null;
}

function handleWin(player, winLine) {
  gameActive = false;
  winLine.forEach(i => getCell(i).classList.add('win-cell'));
  if (player === 'X') {
    playerWins++;
    const pts = 100 * DIFF_MULT[difficulty];
    totalScore += pts;
    document.getElementById('status').innerHTML = `<span style="color:#00f5d4">You win! +${pts}</span>`;
  } else {
    aiWins++;
    document.getElementById('status').innerHTML = '<span style="color:#ff2770">AI wins!</span>';
  }
  updateScoreboard();
  setTimeout(() => {
    if (roundNum >= maxRounds) endGame();
    else nextRound();
  }, 1500);
}

function handleDraw() {
  gameActive = false;
  draws++;
  const pts = 25 * DIFF_MULT[difficulty];
  totalScore += pts;
  document.getElementById('status').innerHTML = `<span style="color:#7b2ff7">Draw! +${pts}</span>`;
  updateScoreboard();
  setTimeout(() => {
    if (roundNum >= maxRounds) endGame();
    else nextRound();
  }, 1500);
}

async function endGame() {
  document.getElementById('final-title').textContent = playerWins > aiWins ? 'You Win!' : playerWins < aiWins ? 'AI Wins' : 'It\'s a Tie!';
  document.getElementById('final-score').textContent = totalScore;
  document.getElementById('result-detail').textContent = `${playerWins} wins, ${draws} draws, ${aiWins} losses (${difficulty})`;
  document.getElementById('game-over-screen').classList.remove('hidden');
  try { await PlayFunClient.submitScore(totalScore); } catch(e) { console.log('Score submit error', e); }
}

difficulty = 'easy';
init();
</script>
</body>
</html>
