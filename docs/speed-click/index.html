<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="x-ogp-key" content="fa29b0ef-94e6-4a82-b20f-08336b32c6c8">
<title>Speed Click - Play.fun</title>
<script src="https://sdk.play.fun"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a; color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh; overflow: hidden;
  }
  .btn {
    padding: 14px 50px; font-size: 1.1em; font-weight: bold; border: none;
    border-radius: 8px; cursor: pointer; background: linear-gradient(135deg, #7b2ff7, #00f5d4);
    color: #fff; margin-top: 15px; transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0,245,212,0.4); }
  #hub-link {
    position: fixed; top: 15px; right: 20px; color: #00f5d4; text-decoration: none;
    font-size: 0.95em; z-index: 100; opacity: 0.8; transition: opacity 0.2s;
  }
  #hub-link:hover { opacity: 1; }
  .overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,10,26,0.92); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 50;
    backdrop-filter: blur(8px);
  }
  .overlay h1 { font-size: 2.8em; margin-bottom: 10px; background: linear-gradient(135deg, #7b2ff7, #00f5d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .overlay p { font-size: 1.15em; color: #aaa; margin-bottom: 5px; }
  .hidden { display: none !important; }
  .score-display { font-size: 2.2em; color: #00f5d4; margin: 10px 0; text-shadow: 0 0 20px rgba(0,245,212,0.4); }

  #hud {
    position: fixed; top: 0; left: 0; right: 0; padding: 12px 25px;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(10,10,26,0.8); backdrop-filter: blur(5px); z-index: 10;
    border-bottom: 1px solid #1a1a3e;
  }
  .hud-item { font-size: 1.1em; }
  .hud-val { color: #00f5d4; font-weight: bold; }
  .hud-val.time { color: #ff2770; }

  #arena {
    position: fixed; top: 50px; left: 0; right: 0; bottom: 0;
    cursor: crosshair;
  }
  .target {
    position: absolute; border-radius: 50%; cursor: pointer;
    transition: transform 0.08s;
  }
  .target:hover { transform: scale(1.05); }
  .target-ring {
    position: absolute; border-radius: 50%; border: 2px solid;
  }
  .target .ring-outer {
    width: 100%; height: 100%; border-color: #ff2770;
    top: 0; left: 0; background: rgba(255,39,112,0.15);
  }
  .target .ring-mid {
    width: 66%; height: 66%; border-color: #7b2ff7;
    top: 17%; left: 17%; background: rgba(123,47,247,0.2);
  }
  .target .ring-inner {
    width: 33%; height: 33%; border-color: #00f5d4;
    top: 33.5%; left: 33.5%; background: rgba(0,245,212,0.3);
  }
  .target .bullseye {
    width: 14%; height: 14%; top: 43%; left: 43%;
    background: #00f5d4; border: none;
    box-shadow: 0 0 12px rgba(0,245,212,0.8);
  }

  .hit-score {
    position: absolute; font-weight: bold; font-size: 1.2em;
    pointer-events: none; animation: floatUp 0.8s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-50px) scale(1.3); }
  }

  .miss-marker {
    position: absolute; width: 8px; height: 8px; border-radius: 50%;
    background: #ff2770; pointer-events: none; opacity: 0.7;
    animation: fadeOut 0.5s ease-out forwards;
  }
  @keyframes fadeOut { to { opacity: 0; transform: scale(2); } }

  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px 30px;
    text-align: left; margin: 10px 0;
  }
  .stats-grid .label { color: #aaa; }
  .stats-grid .val { color: #00f5d4; font-weight: bold; text-align: right; }
</style>
</head>
<body>
<a id="hub-link" href="/">← Back to Hub</a>

<div id="start-screen" class="overlay">
  <h1>Speed Click</h1>
  <p>Click targets precisely for maximum points!</p>
  <p style="color:#00f5d4">Bullseye = 100pts | 30 seconds</p>
  <button class="btn" onclick="startGame()">Play</button>
</div>

<div id="game-over-screen" class="overlay hidden">
  <h1>Time's Up!</h1>
  <div class="score-display" id="final-score">0</div>
  <div class="stats-grid" id="stats-grid"></div>
  <button class="btn" onclick="startGame()">Play Again</button>
</div>

<div id="hud" class="hidden">
  <div class="hud-item">Score: <span class="hud-val" id="hud-score">0</span></div>
  <div class="hud-item">Hits: <span class="hud-val" id="hud-hits">0</span></div>
  <div class="hud-item">Time: <span class="hud-val time" id="hud-time">30</span></div>
</div>

<div id="arena" class="hidden"></div>

<script src="/shared/game-client.js"></script>
<script>
let score, hits, misses, totalClicks, gameActive, timeLeft, targetSize, spawnTimer;
const GAME_TIME = 30;

function init() {
  PlayFunClient.init('speed-click', '94951573-a989-4aad-ad01-abacda2ae548');
  document.getElementById('arena').addEventListener('click', onArenaMiss);
}

function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over-screen').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('arena').classList.remove('hidden');
  document.getElementById('arena').innerHTML = '';

  score = 0; hits = 0; misses = 0; totalClicks = 0;
  gameActive = true; timeLeft = GAME_TIME; targetSize = 70;
  updateHUD();
  spawnTarget();
  runTimer();
}

function runTimer() {
  if (!gameActive) return;
  document.getElementById('hud-time').textContent = timeLeft;
  if (timeLeft <= 0) return endGame();
  timeLeft--;
  setTimeout(runTimer, 1000);
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-hits').textContent = hits;
}

function spawnTarget() {
  if (!gameActive) return;
  const arena = document.getElementById('arena');
  // Remove old targets
  arena.querySelectorAll('.target').forEach(t => t.remove());

  const size = targetSize;
  const margin = 20;
  const x = margin + Math.random() * (arena.clientWidth - size - margin * 2);
  const y = margin + Math.random() * (arena.clientHeight - size - margin * 2);

  const target = document.createElement('div');
  target.className = 'target';
  target.style.width = size + 'px';
  target.style.height = size + 'px';
  target.style.left = x + 'px';
  target.style.top = y + 'px';

  ['ring-outer', 'ring-mid', 'ring-inner', 'bullseye'].forEach(cls => {
    const ring = document.createElement('div');
    ring.className = 'target-ring ' + cls;
    target.appendChild(ring);
  });

  target.addEventListener('click', (e) => {
    e.stopPropagation();
    onTargetClick(e, target, size);
  });

  arena.appendChild(target);

  // Auto-remove after 2.5s
  clearTimeout(spawnTimer);
  spawnTimer = setTimeout(() => {
    if (target.parentNode && gameActive) {
      misses++;
      target.remove();
      spawnTarget();
    }
  }, 2500);
}

function onTargetClick(e, target, size) {
  if (!gameActive) return;
  totalClicks++;
  hits++;

  const rect = target.getBoundingClientRect();
  const cx = rect.left + size / 2;
  const cy = rect.top + size / 2;
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const maxDist = size / 2;
  const accuracy = Math.max(0, 1 - dist / maxDist);

  let pts, color;
  if (accuracy > 0.85) { pts = 100; color = '#00f5d4'; }
  else if (accuracy > 0.6) { pts = 75; color = '#7b2ff7'; }
  else if (accuracy > 0.35) { pts = 50; color = '#f5c842'; }
  else { pts = 25; color = '#ff2770'; }

  score += pts;
  updateHUD();

  // Float score text
  const float = document.createElement('div');
  float.className = 'hit-score';
  float.style.left = (e.clientX - document.getElementById('arena').getBoundingClientRect().left) + 'px';
  float.style.top = (e.clientY - document.getElementById('arena').getBoundingClientRect().top - 10) + 'px';
  float.style.color = color;
  float.textContent = '+' + pts;
  document.getElementById('arena').appendChild(float);
  setTimeout(() => float.remove(), 800);

  target.remove();
  clearTimeout(spawnTimer);

  // Gradually shrink targets
  if (targetSize > 45) targetSize -= 0.5;

  setTimeout(spawnTarget, 200);
}

function onArenaMiss(e) {
  if (!gameActive) return;
  if (e.target.closest('.target')) return;
  totalClicks++;
  misses++;

  const arenaRect = document.getElementById('arena').getBoundingClientRect();
  const marker = document.createElement('div');
  marker.className = 'miss-marker';
  marker.style.left = (e.clientX - arenaRect.left - 4) + 'px';
  marker.style.top = (e.clientY - arenaRect.top - 4) + 'px';
  document.getElementById('arena').appendChild(marker);
  setTimeout(() => marker.remove(), 500);
}

async function endGame() {
  gameActive = false;
  clearTimeout(spawnTimer);
  document.getElementById('arena').innerHTML = '';

  const accuracy = totalClicks > 0 ? Math.round((hits / totalClicks) * 100) : 0;
  const avgPts = hits > 0 ? Math.round(score / hits) : 0;

  document.getElementById('final-score').textContent = score;
  const statsGrid = document.getElementById('stats-grid');
  statsGrid.innerHTML = `
    <span class="label">Targets Hit</span><span class="val">${hits}</span>
    <span class="label">Misses</span><span class="val">${misses}</span>
    <span class="label">Accuracy</span><span class="val">${accuracy}%</span>
    <span class="label">Avg Points/Hit</span><span class="val">${avgPts}</span>
  `;
  document.getElementById('game-over-screen').classList.remove('hidden');

  try { await PlayFunClient.submitScore(score); } catch(e) { console.log('Score submit error', e); }
}

init();
</script>
</body>
</html>
