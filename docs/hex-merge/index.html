<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="x-ogp-key" content="fa29b0ef-94e6-4a82-b20f-08336b32c6c8">
<title>Hex Merge - 2048 Puzzle</title>
<script src="https://sdk.play.fun"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #fff; font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .container { text-align: center; }
  #hud { display: flex; justify-content: space-between; width: 340px; margin-bottom: 10px; }
  .hud-item .label { color: #888; font-size: 12px; text-transform: uppercase; }
  .hud-item .value { color: #00f5d4; font-size: 1.8em; font-weight: bold; }
  #grid { display: grid; grid-template-columns: repeat(4, 80px); gap: 8px; padding: 12px; background: #14141f; border-radius: 12px; border: 2px solid #2a2a4a; }
  .tile {
    width: 80px; height: 80px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 1.5em; font-weight: bold; transition: all 0.15s; background: #1a1a2a;
  }
  .tile[data-val="2"] { background: #2a2a4a; color: #fff; }
  .tile[data-val="4"] { background: #3a2a5a; color: #fff; }
  .tile[data-val="8"] { background: #7b2ff7; color: #fff; }
  .tile[data-val="16"] { background: #6320c9; color: #fff; }
  .tile[data-val="32"] { background: #ff2770; color: #fff; }
  .tile[data-val="64"] { background: #ff1744; color: #fff; }
  .tile[data-val="128"] { background: #f5d400; color: #0a0a1a; font-size: 1.3em; }
  .tile[data-val="256"] { background: #ff6b35; color: #fff; font-size: 1.3em; }
  .tile[data-val="512"] { background: #00f5d4; color: #0a0a1a; font-size: 1.3em; }
  .tile[data-val="1024"] { background: #00bcd4; color: #fff; font-size: 1.1em; }
  .tile[data-val="2048"] { background: linear-gradient(135deg, #f5d400, #ff2770); color: #fff; font-size: 1.1em; box-shadow: 0 0 20px rgba(245,212,0,0.5); }
  .controls-hint { color: #555; font-size: 12px; margin-top: 10px; }
  .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(10,10,26,0.95); display:flex; align-items:center; justify-content:center; z-index:10; }
  .overlay-box { text-align: center; padding: 40px; }
  .overlay-box h1 { color: #00f5d4; font-size: 2.5em; }
  .overlay-box h2 { font-size: 2em; }
  .overlay-box p { color: #888; margin: 8px 0; }
  .big-score { color: #00f5d4; font-size: 3em; font-weight: bold; }
  .btn { padding: 14px 50px; font-size: 1.1em; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; background: linear-gradient(135deg, #7b2ff7, #00f5d4); color: #fff; margin-top: 15px; }
  .back-link { position: fixed; top: 20px; right: 20px; color: #555; text-decoration: none; font-size: 14px; z-index: 20; }
</style>
</head>
<body>
<a href="/" class="back-link">Back to Hub</a>
<div class="container">
  <div id="hud">
    <div class="hud-item"><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div class="hud-item"><div class="label">Best</div><div class="value" id="best">0</div></div>
  </div>
  <div id="grid"></div>
  <div class="controls-hint">Arrow keys or swipe to merge tiles</div>
</div>
<div class="overlay" id="start-overlay">
  <div class="overlay-box">
    <h1>Hex Merge</h1>
    <p>Slide tiles. Merge same numbers. Reach 2048!</p>
    <button class="btn" onclick="startGame()">PLAY</button>
  </div>
</div>
<div class="overlay" id="end-overlay" style="display:none;">
  <div class="overlay-box">
    <h2 id="end-title">Game Over</h2>
    <div class="big-score" id="final-score">0</div>
    <button class="btn" onclick="startGame()">PLAY AGAIN</button>
  </div>
</div>
<script src="/shared/game-client.js"></script>
<script>
const SIZE = 4;
let grid, score, bestScore, gameActive;
bestScore = parseInt(localStorage.getItem('hex-merge-best') || '0');
document.getElementById('best').textContent = bestScore;

function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  document.getElementById('end-overlay').style.display = 'none';
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0; gameActive = true;
  addRandom(); addRandom();
  render();
}

function addRandom() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (empty.length === 0) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function slide(row) {
  let arr = row.filter(v => v !== 0);
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i+1]) {
      arr[i] *= 2;
      score += arr[i];
      arr.splice(i+1, 1);
    }
  }
  while (arr.length < SIZE) arr.push(0);
  return arr;
}

function move(dir) {
  if (!gameActive) return;
  const old = JSON.stringify(grid);

  if (dir === 'left') {
    for (let r = 0; r < SIZE; r++) grid[r] = slide(grid[r]);
  } else if (dir === 'right') {
    for (let r = 0; r < SIZE; r++) grid[r] = slide(grid[r].reverse()).reverse();
  } else if (dir === 'up') {
    for (let c = 0; c < SIZE; c++) {
      let col = grid.map(r => r[c]);
      col = slide(col);
      col.forEach((v, r) => grid[r][c] = v);
    }
  } else if (dir === 'down') {
    for (let c = 0; c < SIZE; c++) {
      let col = grid.map(r => r[c]).reverse();
      col = slide(col).reverse();
      col.forEach((v, r) => grid[r][c] = v);
    }
  }

  if (JSON.stringify(grid) !== old) {
    addRandom();
    document.getElementById('score').textContent = score;
    if (score > bestScore) { bestScore = score; localStorage.setItem('hex-merge-best', bestScore); document.getElementById('best').textContent = bestScore; }
    render();
    if (checkWin()) return;
    if (!canMove()) gameOver();
  }
}

function canMove() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) return true;
      if (c < SIZE-1 && grid[r][c] === grid[r][c+1]) return true;
      if (r < SIZE-1 && grid[r][c] === grid[r+1][c]) return true;
    }
  return false;
}

function checkWin() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 2048) {
        document.getElementById('end-title').textContent = 'You Win!';
        document.getElementById('final-score').textContent = score;
        document.getElementById('end-overlay').style.display = 'flex';
        gameActive = false;
        PlayFunClient.submitScore(score);
        return true;
      }
  return false;
}

function render() {
  const container = document.getElementById('grid');
  container.innerHTML = '';
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      const val = grid[r][c];
      if (val) { tile.textContent = val; tile.dataset.val = val; }
      container.appendChild(tile);
    }
}

async function gameOver() {
  gameActive = false;
  document.getElementById('end-title').textContent = 'Game Over';
  document.getElementById('final-score').textContent = score;
  document.getElementById('end-overlay').style.display = 'flex';
  await PlayFunClient.submitScore(score);
}

// Controls
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
    move(e.key.replace('Arrow','').toLowerCase());
  }
});

let tx, ty;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) { move(dx > 0 ? 'right' : 'left'); }
  else if (Math.abs(dy) > 20) { move(dy > 0 ? 'down' : 'up'); }
});

PlayFunClient.init('hex-merge', 'GAME_ID_HERE');
</script>
</body>
</html>
